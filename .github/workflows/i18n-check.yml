name: i18n Audit
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run i18n audit (non-blocking)
        run: node scripts/check-i18n.mjs --report-only
