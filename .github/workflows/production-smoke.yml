name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_URL: ${{ secrets.PRODUCTION_URL || 'https://giant-schrodinger.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Production smoke
        run: npm run smoke:production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Deployed rehearsal E2E
        run: npm run test:e2e:rehearsal
        env:
          PRODUCTION_URL: ${{ env.PRODUCTION_URL }}
