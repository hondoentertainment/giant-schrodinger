name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          node -e "
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const pct = report.total.lines.pct;
              console.log('Line coverage: ' + pct + '%');
              if (pct < 40) { console.error('Coverage below 40% threshold'); process.exit(1); }
            } catch(e) { console.warn('Coverage report not found, skipping check'); }
          "

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e:desktop
        env:
          CI: true

      - name: Build
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
