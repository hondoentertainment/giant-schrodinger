name: Deploy Staging

on:
  push:
    branches:
      - 'staging/**'
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-staging"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:desktop
        env:
          CI: true
      - name: Build (staging)
        run: npm run build
        env:
          PUBLIC_ENV: staging
          VITE_APP_ENV: staging
      # Note: staging does NOT upload source maps to Sentry's prod release.
      # If you want Sentry in staging, tag the release with `-staging` suffix.
      - run: find ./dist -name '*.map' -delete
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages-staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
