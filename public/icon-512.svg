<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1054"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Left circle of Venn diagram -->
  <circle cx="197" cy="256" r="112" fill="none" stroke="#a855f7" stroke-width="6" opacity="0.8"/>
  <circle cx="197" cy="256" r="112" fill="#a855f7" opacity="0.15"/>
  <!-- Right circle of Venn diagram -->
  <circle cx="315" cy="256" r="112" fill="none" stroke="#6366f1" stroke-width="6" opacity="0.8"/>
  <circle cx="315" cy="256" r="112" fill="#6366f1" opacity="0.15"/>
  <!-- Overlap highlight -->
  <clipPath id="leftClip">
    <circle cx="197" cy="256" r="112"/>
  </clipPath>
  <circle cx="315" cy="256" r="112" fill="#d946ef" opacity="0.3" clip-path="url(#leftClip)"/>
  <!-- Crosshair / target in the center -->
  <circle cx="256" cy="256" r="32" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <circle cx="256" cy="256" r="10" fill="#ffffff" opacity="0.9"/>
  <line x1="256" y1="208" x2="256" y2="232" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <line x1="256" y1="280" x2="256" y2="304" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <line x1="208" y1="256" x2="232" y2="256" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <line x1="280" y1="256" x2="304" y2="256" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
</svg>
