<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1054"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Left circle of Venn diagram -->
  <circle cx="74" cy="96" r="42" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.8"/>
  <circle cx="74" cy="96" r="42" fill="#a855f7" opacity="0.15"/>
  <!-- Right circle of Venn diagram -->
  <circle cx="118" cy="96" r="42" fill="none" stroke="#6366f1" stroke-width="4" opacity="0.8"/>
  <circle cx="118" cy="96" r="42" fill="#6366f1" opacity="0.15"/>
  <!-- Overlap highlight -->
  <clipPath id="leftClip">
    <circle cx="74" cy="96" r="42"/>
  </clipPath>
  <circle cx="118" cy="96" r="42" fill="#d946ef" opacity="0.3" clip-path="url(#leftClip)"/>
  <!-- Crosshair / target in the center -->
  <circle cx="96" cy="96" r="12" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
  <circle cx="96" cy="96" r="4" fill="#ffffff" opacity="0.9"/>
  <line x1="96" y1="78" x2="96" y2="88" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
  <line x1="96" y1="104" x2="96" y2="114" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
  <line x1="78" y1="96" x2="88" y2="96" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
  <line x1="104" y1="96" x2="114" y2="96" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
</svg>
